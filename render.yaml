# Render Blueprint for Kitchen E-Commerce PWA — single-service deployment
# Docs: https://render.com/docs/blueprint-spec
#
# This deploys ONE web service that:
#   - Builds the React PWA (client/dist)
#   - Runs the Express API
#   - Serves the built frontend at the same origin as the API
# Result: both frontend and backend live at https://<service>.onrender.com.
# Frontend → backend calls use relative /api, so no CORS config is needed.
#
# Setup:
#   1. Create env group "kitchen-ecom-secrets" in Render dashboard and fill:
#        - MONGO_URI
#        - ARKESEL_API_KEY
#        - SEED_SUPER_ADMIN_PHONE
#        - SEED_SUPER_ADMIN_PASSWORD
#        - (optional) PAYSTACK_SECRET_KEY, PAYSTACK_PUBLIC_KEY, PAYSTACK_WEBHOOK_SECRET
#        - (optional) VITE_PAYSTACK_PUBLIC_KEY, VITE_WHATSAPP_NUMBER
#   2. Dashboard → New → Blueprint → point at this repo.
#   3. Done. The build installs both workspaces, builds the client, and the
#      server serves everything.

envVarGroups:
  - name: kitchen-ecom-secrets
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ARKESEL_API_KEY
        sync: false
      - key: SEED_SUPER_ADMIN_PHONE
        sync: false
      - key: SEED_SUPER_ADMIN_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        sync: false

services:
  - type: web
    name: kitchenlovers-ecom
    runtime: node
    plan: starter # Starter or higher is required to attach a disk
    region: oregon
    # Run from repo root so npm workspaces resolves both server and client.
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - fromGroup: kitchen-ecom-secrets

      - key: NODE_ENV
        value: production
      - key: UPLOADS_DIR
        value: /var/data/uploads

      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d

      - key: ARKESEL_SENDER_ID
        value: KTLovers
      - key: ARKESEL_SANDBOX
        value: "false"

      - key: OTP_LENGTH
        value: "6"
      - key: OTP_EXPIRES_MINUTES
        value: "10"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "300"

      # Auto-seed on boot. Idempotent — set to "false" to skip.
      - key: AUTO_SEED
        value: "true"
