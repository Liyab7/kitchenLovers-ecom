# Render Blueprint for Kitchen E-Commerce PWA
# Docs: https://render.com/docs/blueprint-spec
#
# This provisions two services from a single Git repo:
#   - kitchen-ecom-api    (Node web service, Express + Socket.IO)
#   - kitchen-ecom-web    (Static site, Vite React PWA)
#
# After connecting the repo to Render, "New +" -> "Blueprint" and point it at this file.
# Render will spin both up. You then fill in the secrets marked `sync: false`
# (MongoDB URI, JWT secrets, Paystack keys, Arkesel keys) in each service's
# Environment tab. See RENDER.md for the full walkthrough.

services:
  # ----------------------------------------------------------------------
  # Backend API
  # ----------------------------------------------------------------------
  - type: web
    name: kitchen-ecom-api
    runtime: node
    plan: starter # Starter or higher is required to attach a disk
    region: oregon # change if you prefer fra/sgp/etc.
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render injects PORT; this is a fallback only
      - key: UPLOADS_DIR
        value: /var/data/uploads
      # CLIENT_URL is the public static-site URL with scheme, e.g.
      #   https://kitchen-ecom-web.onrender.com
      # Comma-separated values are supported (add a custom domain later).
      # Set this manually after the static site's first deploy.
      - key: CLIENT_URL
        sync: false
      # PUBLIC_URL is the backend's own public URL (with scheme) — prefixed onto
      # uploaded image paths so the frontend can load /uploads from a different
      # origin. Example: https://kitchen-ecom-api.onrender.com
      - key: PUBLIC_URL
        sync: true
      # ---- Secrets: set these in the Render dashboard after first deploy ----
      - key: MONGO_URI
        sync: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      # Seed values (used on first run by `npm run seed`)
      - key: SEED_SUPER_ADMIN_PHONE
        sync: true
      - key: SEED_SUPER_ADMIN_PASSWORD
        sync: true
      # Arkesel SMS — leave blank for stub mode (OTPs printed to logs)
      - key: ARKESEL_API_KEY
        sync: true
      - key: ARKESEL_SENDER_ID
        value: KitchenLuv
      - key: ARKESEL_SANDBOX
        value: "false"
      # Paystack — leave blank for stub mode (auto-success checkout)
      - key: PAYSTACK_SECRET_KEY
        sync: true
      - key: PAYSTACK_PUBLIC_KEY
        sync: true
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: true
      # OTP / bcrypt / rate limits
      - key: OTP_LENGTH
        value: "6"
      - key: OTP_EXPIRES_MINUTES
        value: "10"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "300"

  # ----------------------------------------------------------------------
  # Frontend static site
  # ----------------------------------------------------------------------
  - type: web
    name: kitchen-ecom-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    # SPA routing: every non-asset path falls back to index.html so client-side
    # routes (e.g. /admin, /checkout/callback) load the app shell.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    envVars:
      # Vite reads these at build time. Set both to the API service's public URL
      # after its first deploy, e.g.:
      #   VITE_API_URL    = https://kitchen-ecom-api.onrender.com/api
      #   VITE_SOCKET_URL = https://kitchen-ecom-api.onrender.com
      - key: VITE_API_URL
        sync: true
      - key: VITE_SOCKET_URL
        sync: true
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: true
      - key: VITE_WHATSAPP_NUMBER
        sync: true
