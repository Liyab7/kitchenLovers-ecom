# Render Blueprint — Kitchen E-Commerce PWA (single-service deployment)
# Every setting is declared here so deploys are fully automated.
# Docs: https://render.com/docs/blueprint-spec
#
# ONE-TIME SETUP (only thing you do manually — Render won't store secrets in git):
#   Dashboard → Env Groups → "kitchen-ecom-secrets" → paste these:
#     MONGO_URI                   = mongodb+srv://...
#     ARKESEL_API_KEY             = <your Arkesel key>  (optional, SMS stubs if blank)
#     SEED_SUPER_ADMIN_PHONE      = <admin phone>       (optional, default in seed)
#     SEED_SUPER_ADMIN_PASSWORD   = <admin password>    (optional, default in seed)
#     PAYSTACK_SECRET_KEY         = sk_live_...         (optional, stubs if blank)
#     PAYSTACK_PUBLIC_KEY         = pk_live_...         (optional)
#     PAYSTACK_WEBHOOK_SECRET     = <Paystack webhook>  (optional)
#     VITE_PAYSTACK_PUBLIC_KEY    = pk_live_...         (optional, same as above)
#     VITE_WHATSAPP_NUMBER        = 233XXXXXXXXX        (optional)
#
# DEPLOY:
#   Dashboard → New → Blueprint → point at this repo. Done — no other manual setup.

envVarGroups:
  - name: kitchen-ecom-secrets
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ARKESEL_API_KEY
        sync: false
      - key: SEED_SUPER_ADMIN_PHONE
        sync: false
      - key: SEED_SUPER_ADMIN_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false

services:
  - type: web
    name: kitchenlovers-ecom
    runtime: node
    plan: starter            # Starter+ required to attach a persistent disk
    region: oregon
    # Repo root — npm workspaces resolves both server and client from here.
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    # Persistent disk for product images / uploads. Survives restarts and redeploys.
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      # --- Secrets (one-time fill in env group) -------------------------------
      - fromGroup: kitchen-ecom-secrets

      # --- Runtime config (hard-coded — no dashboard edits needed) ------------
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: UPLOADS_DIR
        value: /var/data/uploads

      # --- JWT (auto-generated long random strings) ---------------------------
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d

      # --- SMS (Arkesel) ------------------------------------------------------
      - key: ARKESEL_SENDER_ID
        value: KTLovers
      - key: ARKESEL_SANDBOX
        value: "false"

      # --- OTP + security tuning ---------------------------------------------
      - key: OTP_LENGTH
        value: "6"
      - key: OTP_EXPIRES_MINUTES
        value: "10"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "300"

      # --- First-run database seeding ----------------------------------------
      - key: AUTO_SEED
        value: "true"

      # --- Origins (set CLIENT_URL in the kitchen-ecom-secrets env group) -------
      - key: PUBLIC_URL
        value: https://kitchenlovers-ecom-crqf.onrender.com
